{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful — CECP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth_portal.css' %}" />
    <link rel="icon" type="image/jpeg" href="{% static 'images/cecp-logo.jpg' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <span class="logo-cecp">CECP</span>
                <span class="logo-sub">RIT ROORKEE</span>
            </a>
        </div>
    </nav>

    <main class="main-grid" style="grid-template-columns:1fr;">
        <div class="center-panel">
            <div class="login-card" style="max-width:420px;text-align:center;">

                <div class="card-icon-wrap">
                    <div class="card-icon" style="background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);color:var(--cyan);width:64px;height:64px;border-radius:50%;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                        </svg>
                    </div>
                </div>

                <h2 class="card-title"><span class="text-cyan">PASSWORD</span> RESET!</h2>
                <div class="card-subtitle-wrap">
                    <div class="subtitle-line"></div>
                    <span class="card-subtitle">All done</span>
                    <div class="subtitle-line"></div>
                </div>

                <p style="font-size:14px;color:var(--muted);line-height:1.75;margin:12px 0 28px;">
                    Your password has been successfully updated.<br>
                    You can now <span style="color:var(--cyan);">log in</span> with your new credentials.
                </p>

                <!-- Auto-redirect countdown -->
                <p style="font-size:12px;color:var(--muted-dim);margin-bottom:20px;">
                    Redirecting to login in <span id="countdown" style="color:var(--cyan);font-weight:700;">5</span>s…
                </p>

                <a href="{% url 'landing:login' %}" class="login-btn" id="loginNowBtn" style="text-decoration:none;display:flex;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
                    Go to Login Now
                </a>
            </div>
        </div>
    </main>

    <script>
    let t = 5;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
        t--;
        if (el) el.textContent = t;
        if (t <= 0) {
            clearInterval(interval);
            window.location.href = "{% url 'landing:login' %}";
        }
    }, 1000);
    </script>
</body>
</html>
