{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent — CECP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth_portal.css' %}" />
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <span class="logo-cecp">CECP</span>
                <span class="logo-sub">RIT ROORKEE</span>
            </a>
        </div>
    </nav>

    <main class="main-grid" style="grid-template-columns:1fr;">
        <div class="center-panel">
            <div class="login-card" style="max-width:440px;text-align:center;">

                <div class="card-icon-wrap">
                    <div class="card-icon" style="background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#4ade80;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
                            <path d="m9 12 2 2 4-4" stroke="#4ade80" stroke-width="2"/>
                        </svg>
                    </div>
                </div>

                <h2 class="card-title"><span style="color:#4ade80;">CHECK</span> YOUR EMAIL</h2>
                <div class="card-subtitle-wrap">
                    <div class="subtitle-line"></div>
                    <span class="card-subtitle">Reset Link Sent</span>
                    <div class="subtitle-line"></div>
                </div>

                <p style="font-size:14px;color:var(--muted);line-height:1.75;margin:12px 0 28px;">
                    If an account exists for that email, we've sent a password reset link.<br>
                    <span style="color:var(--text);">Check your inbox</span> — the link expires in <span style="color:var(--cyan);">24 hours</span>.
                </p>

                <div style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:10px;padding:14px 18px;margin-bottom:24px;font-size:12px;color:#86efac;line-height:1.6;">
                    💡 Don't see it? Check your <strong>Spam</strong> or <strong>Junk</strong> folder.
                </div>

                <a href="{% url 'landing:login' %}" class="login-btn" style="text-decoration:none;display:flex;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
                    Back to Login
                </a>
            </div>
        </div>
    </main>
</body>
</html>
