{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #020617; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out both; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }
    </style>
    <link rel="icon" type="image/jpeg" href="{% static 'images/cecp-logo.jpg' %}">
</head>
<body>
    <div class="text-center px-6 max-w-lg animate-in">
        <!-- Success Icon -->
        <div class="relative inline-flex items-center justify-center mb-8">
            <div style="position:absolute; width:80px; height:80px; border-radius:50%; border:2px solid rgba(34,197,94,0.3); animation: pulse-ring 2s ease-out infinite;"></div>
            <div class="w-20 h-20 rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,rgba(34,197,94,0.2),rgba(6,182,212,0.2)); border:1px solid rgba(34,197,94,0.4);">
                <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
            </div>
        </div>

        <h1 class="text-3xl sm:text-4xl font-black text-white mb-4">Application <span class="text-emerald-400">Submitted!</span></h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            Thank you for your interest in CECP! The Club Head will review your application shortly.
            You'll receive a notification once your membership is approved.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="{% url 'landing:index' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold transition-all" style="background:linear-gradient(135deg,#06b6d4,#6366f1); color:#fff; text-decoration:none; box-shadow:0 8px 30px rgba(6,182,212,0.25);">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
